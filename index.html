
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans, system-ui, sans-serif); background: var(--color-background-tertiary, #f5f5f0); color: var(--color-text-primary, #1a1a1a); min-height: 100vh; }

.app { max-width: 900px; margin: 0 auto; padding: 1rem; }
.header { display: flex; align-items: center; justify-content: space-between; padding: 1rem 0 1.5rem; border-bottom: 0.5px solid var(--color-border-tertiary); margin-bottom: 1.5rem; flex-wrap: wrap; gap: 0.75rem; }
.logo { font-size: 18px; font-weight: 500; display: flex; align-items: center; gap: 8px; }
.logo-dot { width: 10px; height: 10px; border-radius: 50%; background: #185FA5; }
.user-code { font-size: 12px; color: var(--color-text-secondary); background: var(--color-background-secondary, #f0efe8); padding: 4px 10px; border-radius: 20px; border: 0.5px solid var(--color-border-tertiary); font-family: var(--font-mono, monospace); cursor: pointer; }

.nav { display: flex; gap: 4px; margin-bottom: 1.5rem; background: var(--color-background-secondary, #f0efe8); padding: 4px; border-radius: 10px; border: 0.5px solid var(--color-border-tertiary); }
.nav-btn { padding: 6px 14px; border: none; background: none; border-radius: 7px; font-size: 13px; cursor: pointer; color: var(--color-text-secondary); transition: all 0.15s; font-family: inherit; }
.nav-btn.active { background: var(--color-background-primary, white); color: var(--color-text-primary); font-weight: 500; border: 0.5px solid var(--color-border-tertiary); }
.nav-btn:hover:not(.active) { color: var(--color-text-primary); }

.card { background: var(--color-background-primary, white); border-radius: 12px; border: 0.5px solid var(--color-border-tertiary); padding: 1.25rem; margin-bottom: 1rem; }
.card-title { font-size: 13px; color: var(--color-text-secondary); margin-bottom: 0.75rem; font-weight: 500; text-transform: uppercase; letter-spacing: 0.04em; }

.metric-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; margin-bottom: 1rem; }
.metric { background: var(--color-background-secondary, #f5f5f0); border-radius: 8px; padding: 0.875rem; }
.metric-label { font-size: 11px; color: var(--color-text-secondary); margin-bottom: 4px; }
.metric-value { font-size: 20px; font-weight: 500; }
.metric-value.positive { color: #0F6E56; }
.metric-value.negative { color: #A32D2D; }
.metric-value.neutral { color: #185FA5; }

.asset-card { background: var(--color-background-primary, white); border-radius: 12px; border: 0.5px solid var(--color-border-tertiary); padding: 1.25rem; margin-bottom: 1rem; }
.asset-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
.asset-name { font-size: 16px; font-weight: 500; display: flex; align-items: center; gap: 8px; }
.asset-ticker { font-size: 11px; background: var(--color-background-secondary); padding: 2px 8px; border-radius: 4px; color: var(--color-text-secondary); font-family: var(--font-mono, monospace); }
.badge { font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 500; }
.badge-up { background: #FAECE7; color: #993C1D; }
.badge-down { background: #EAF3DE; color: #3B6D11; }
.badge-neutral { background: #E6F1FB; color: #185FA5; }

.decision-box { border-radius: 8px; padding: 1rem; margin-top: 0.75rem; }
.decision-invest { background: #E1F5EE; border: 0.5px solid #9FE1CB; }
.decision-reduce { background: #FAECE7; border: 0.5px solid #F5C4B3; }
.decision-normal { background: #E6F1FB; border: 0.5px solid #B5D4F4; }

.decision-label { font-size: 11px; font-weight: 500; margin-bottom: 4px; }
.decision-invest .decision-label { color: #0F6E56; }
.decision-reduce .decision-label { color: #993C1D; }
.decision-normal .decision-label { color: #185FA5; }

.decision-amount { font-size: 28px; font-weight: 500; }
.decision-invest .decision-amount { color: #085041; }
.decision-reduce .decision-amount { color: #712B13; }
.decision-normal .decision-amount { color: #0C447C; }

.decision-detail { font-size: 12px; color: var(--color-text-secondary); margin-top: 4px; }

.input-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 0.75rem; }
.input-group { display: flex; flex-direction: column; gap: 4px; }
.input-group label { font-size: 12px; color: var(--color-text-secondary); }
input[type="number"], input[type="text"], select { width: 100%; padding: 7px 10px; border: 0.5px solid var(--color-border-secondary); border-radius: 6px; background: var(--color-background-primary); color: var(--color-text-primary); font-size: 14px; font-family: inherit; }
input:focus, select:focus { outline: none; border-color: #185FA5; box-shadow: 0 0 0 2px rgba(24,95,165,0.1); }

.btn { padding: 8px 16px; border-radius: 7px; border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); color: var(--color-text-primary); font-size: 13px; cursor: pointer; font-family: inherit; transition: all 0.15s; font-weight: 500; }
.btn:hover { background: var(--color-background-secondary); }
.btn:active { transform: scale(0.98); }
.btn-primary { background: #185FA5; color: white; border-color: #185FA5; }
.btn-primary:hover { background: #0C447C; }
.btn-danger { color: #A32D2D; border-color: #F7C1C1; }
.btn-danger:hover { background: #FCEBEB; }
.btn-success { background: #0F6E56; color: white; border-color: #0F6E56; }
.btn-success:hover { background: #085041; }

.reserve-bar { background: var(--color-background-secondary); border-radius: 6px; height: 8px; margin-top: 8px; overflow: hidden; }
.reserve-fill { height: 100%; border-radius: 6px; background: linear-gradient(90deg, #1D9E75, #185FA5); transition: width 0.4s; }

.history-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 0.5px solid var(--color-border-tertiary); font-size: 13px; }
.history-item:last-child { border-bottom: none; }
.history-date { color: var(--color-text-secondary); font-size: 11px; }
.history-amount { font-weight: 500; }
.history-amount.pos { color: #0F6E56; }
.history-amount.neg { color: #A32D2D; }

.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 1rem; }
.modal { background: var(--color-background-primary); border-radius: 14px; padding: 1.5rem; width: 100%; max-width: 500px; border: 0.5px solid var(--color-border-secondary); max-height: 90vh; overflow-y: auto; }
.modal-title { font-size: 16px; font-weight: 500; margin-bottom: 1.25rem; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 1.25rem; }

.section-title { font-size: 15px; font-weight: 500; margin-bottom: 1rem; display: flex; align-items: center; gap: 8px; }
.empty-state { text-align: center; padding: 3rem 1rem; color: var(--color-text-secondary); font-size: 14px; }
.empty-icon { font-size: 32px; margin-bottom: 0.75rem; }

.welcome-screen { text-align: center; padding: 3rem 1.5rem; }
.welcome-title { font-size: 24px; font-weight: 500; margin-bottom: 0.5rem; }
.welcome-sub { color: var(--color-text-secondary); font-size: 15px; margin-bottom: 2rem; line-height: 1.6; }
.code-display { font-size: 32px; font-family: var(--font-mono, monospace); font-weight: 500; letter-spacing: 0.1em; background: var(--color-background-secondary); padding: 1rem 2rem; border-radius: 10px; display: inline-block; margin: 1rem 0; color: #185FA5; border: 1px dashed var(--color-border-secondary); }

.tabs { display: flex; gap: 2px; margin-bottom: 1rem; border-bottom: 0.5px solid var(--color-border-tertiary); }
.tab { padding: 8px 14px; font-size: 13px; border: none; background: none; cursor: pointer; color: var(--color-text-secondary); border-bottom: 2px solid transparent; margin-bottom: -1px; font-family: inherit; transition: all 0.15s; }
.tab.active { color: #185FA5; border-bottom-color: #185FA5; font-weight: 500; }

.simulator-result { background: var(--color-background-secondary); border-radius: 8px; padding: 1rem; }
.sim-row { display: flex; justify-content: space-between; font-size: 13px; padding: 4px 0; border-bottom: 0.5px solid var(--color-border-tertiary); }
.sim-row:last-child { border-bottom: none; }

.alert { padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 1rem; }
.alert-warning { background: #FAEEDA; color: #633806; border: 0.5px solid #FAC775; }
.alert-info { background: #E6F1FB; color: #0C447C; border: 0.5px solid #B5D4F4; }

@media (max-width: 600px) {
  .metric-grid { grid-template-columns: repeat(2, 1fr); }
  .input-row { grid-template-columns: 1fr 1fr; }
  .nav-btn { padding: 6px 10px; font-size: 12px; }
}
</style>
</head>
<body>
<div class="app" id="app"></div>

<script>
const DB_KEY = 'dca_app_v1';

function loadData() {
  try { return JSON.parse(localStorage.getItem(DB_KEY)) || null; } catch(e) { return null; }
}
function saveData(d) {
  localStorage.setItem(DB_KEY, JSON.stringify(d));
}
function genCode() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let code = '';
  for(let i = 0; i < 8; i++) code += chars[Math.floor(Math.random() * chars.length)];
  return code;
}

function calcDCA(asset) {
  const { currentPrice, avgPrice, dcaBase, reserve, thresholds } = asset;
  const t = thresholds || { high: 20, low: -20, highAdjust: -40, lowAdjust: 40 };
  if(!avgPrice || avgPrice === 0) return { dcaRecommended: dcaBase, delta: 0, status: 'neutral', reason: 'Marché neutre', canApply: true };
  const pct = ((currentPrice - avgPrice) / avgPrice) * 100;
  let status, reason, adjustPct;
  if(pct >= t.high) { status = 'high'; reason = 'Marché élevé'; adjustPct = t.highAdjust; }
  else if(pct <= t.low) { status = 'low'; reason = 'Marché en baisse'; adjustPct = t.lowAdjust; }
  else { status = 'neutral'; reason = 'Marché neutre'; adjustPct = 0; }
  const delta = (dcaBase * Math.abs(adjustPct)) / 100;
  let dcaRecommended = dcaBase;
  let canApply = true;
  if(status === 'high') { dcaRecommended = dcaBase - delta; }
  else if(status === 'low') {
    dcaRecommended = dcaBase + delta;
    if(reserve < delta) { dcaRecommended = dcaBase + reserve; canApply = reserve > 0; }
  }
  dcaRecommended = Math.max(0, Math.round(dcaRecommended * 100) / 100);
  return { dcaRecommended, delta: Math.round((dcaRecommended - dcaBase) * 100) / 100, status, reason, pct: Math.round(pct * 10) / 10, canApply };
}

let state = { screen: 'loading', tab: 'dashboard', modal: null, data: null };

function render() {
  const app = document.getElementById('app');
  if(state.screen === 'loading') {
    app.innerHTML = renderWelcome();
  } else if(state.screen === 'enter-code') {
    app.innerHTML = renderEnterCode();
  } else {
    app.innerHTML = renderMain();
    if(state.modal) document.body.insertAdjacentHTML('beforeend', renderModal());
  }
  attachEvents();
}

function renderWelcome() {
  return `<div class="welcome-screen">
    <div style="font-size: 40px; margin-bottom: 1rem;">📈</div>
    <div class="welcome-title">DCA Dynamique</div>
    <div class="welcome-sub">Gérez votre stratégie d'investissement DCA adaptatif.<br>Votre réserve finance automatiquement les opportunités d'achat.</div>
    <div style="display: flex; flex-direction: column; gap: 10px; max-width: 320px; margin: 0 auto;">
      <button class="btn btn-primary" onclick="newAccount()" style="padding: 12px;">Créer un nouveau compte</button>
      <button class="btn" onclick="showEnterCode()" style="padding: 12px;">Accéder avec mon code</button>
    </div>
    <div class="alert alert-info" style="max-width: 380px; margin: 1.5rem auto 0; text-align: left;">
      Votre code unique vous permet de retrouver votre portefeuille sur n'importe quel appareil. Conservez-le précieusement.
    </div>
  </div>`;
}

function renderEnterCode() {
  return `<div class="welcome-screen">
    <div class="welcome-title">Accéder à mon compte</div>
    <div class="welcome-sub">Entrez votre code unique pour accéder à votre portefeuille.</div>
    <div style="max-width: 320px; margin: 0 auto;">
      <input type="text" id="code-input" placeholder="Ex: ABC12345" style="text-align: center; font-size: 20px; letter-spacing: 0.1em; font-family: var(--font-mono, monospace); padding: 12px; width: 100%; margin-bottom: 10px; text-transform: uppercase;">
      <button class="btn btn-primary" onclick="loginWithCode()" style="width: 100%; padding: 12px;">Accéder</button>
      <button class="btn" onclick="showWelcome()" style="width: 100%; padding: 10px; margin-top: 8px;">Retour</button>
    </div>
    <div id="code-error" style="color: #A32D2D; font-size: 13px; margin-top: 0.75rem;"></div>
  </div>`;
}

function renderMain() {
  const d = state.data;
  const tabs = [
    { id: 'dashboard', label: 'Tableau de bord' },
    { id: 'assets', label: 'Actifs' },
    { id: 'history', label: 'Historique' },
    { id: 'simulator', label: 'Simulateur' },
    { id: 'settings', label: 'Paramètres' },
  ];
  const totalValue = (d.assets || []).reduce((sum, a) => sum + (a.currentPrice * a.quantity), 0);
  const totalReserve = (d.assets || []).reduce((sum, a) => sum + (a.reserve || 0), 0);
  return `
  <div class="header">
    <div class="logo"><div class="logo-dot"></div>DCA Dynamique</div>
    <div style="display: flex; align-items: center; gap: 8px;">
      <div class="user-code" onclick="copyCode()" title="Cliquer pour copier">Code: ${d.userCode} 📋</div>
      <button class="btn btn-danger" onclick="logout()" style="font-size: 12px; padding: 4px 10px;">Déconnexion</button>
    </div>
  </div>
  <nav class="nav">
    ${tabs.map(t => `<button class="nav-btn ${state.tab === t.id ? 'active' : ''}" onclick="setTab('${t.id}')">${t.label}</button>`).join('')}
  </nav>
  <div id="tab-content">
    ${state.tab === 'dashboard' ? renderDashboard(d, totalValue, totalReserve) : ''}
    ${state.tab === 'assets' ? renderAssets(d) : ''}
    ${state.tab === 'history' ? renderHistory(d) : ''}
    ${state.tab === 'simulator' ? renderSimulator(d) : ''}
    ${state.tab === 'settings' ? renderSettings(d) : ''}
  </div>`;
}

function renderDashboard(d, totalValue, totalReserve) {
  const assets = d.assets || [];
  const totalDCA = assets.reduce((sum, a) => sum + a.dcaBase, 0);
  return `
  <div class="metric-grid">
    <div class="metric"><div class="metric-label">Valeur totale</div><div class="metric-value neutral">€${fmt(totalValue)}</div></div>
    <div class="metric"><div class="metric-label">Réserve totale</div><div class="metric-value positive">€${fmt(totalReserve)}</div></div>
    <div class="metric"><div class="metric-label">DCA mensuel base</div><div class="metric-value">€${fmt(totalDCA)}</div></div>
    <div class="metric"><div class="metric-label">Actifs suivis</div><div class="metric-value">${assets.length}</div></div>
  </div>
  ${assets.length === 0 ? `<div class="empty-state"><div class="empty-icon">📊</div>Aucun actif ajouté.<br>Rendez-vous dans l'onglet <strong>Actifs</strong> pour commencer.</div>` : ''}
  ${assets.map(a => renderAssetCard(a, true)).join('')}`;
}

function renderAssetCard(a, dashboard = false) {
  const calc = calcDCA(a);
  const value = a.currentPrice * a.quantity;
  const reservePct = Math.min(100, a.reserve > 0 ? Math.min(100, (a.reserve / (a.dcaBase * 3)) * 100) : 0);
  const statusClass = calc.status === 'high' ? 'badge-up' : calc.status === 'low' ? 'badge-down' : 'badge-neutral';
  const decisionClass = calc.status === 'high' ? 'decision-reduce' : calc.status === 'low' ? 'decision-invest' : 'decision-normal';
  const deltaText = calc.delta > 0 ? `+€${fmt(calc.delta)}` : calc.delta < 0 ? `-€${fmt(Math.abs(calc.delta))}` : 'inchangé';
  const reserveWarning = calc.status === 'low' && (a.reserve || 0) < (a.dcaBase * (a.thresholds?.lowAdjust || 40) / 100) && a.reserve > 0;
  return `
  <div class="asset-card">
    <div class="asset-header">
      <div class="asset-name">
        ${a.icon || '📦'} ${a.name}
        <span class="asset-ticker">${a.ticker || ''}</span>
        <span class="badge ${statusClass}">${calc.reason}</span>
      </div>
      ${!dashboard ? `<button class="btn btn-danger" onclick="deleteAsset('${a.id}')" style="font-size: 12px; padding: 4px 8px;">Supprimer</button>` : ''}
    </div>
    <div class="metric-grid" style="grid-template-columns: repeat(4, 1fr);">
      <div class="metric"><div class="metric-label">Prix actuel</div><div class="metric-value" style="font-size: 15px;">€${fmt(a.currentPrice)}</div></div>
      <div class="metric"><div class="metric-label">Prix moyen</div><div class="metric-value" style="font-size: 15px;">€${fmt(a.avgPrice || 0)}</div></div>
      <div class="metric"><div class="metric-label">Quantité</div><div class="metric-value" style="font-size: 15px;">${a.quantity}</div></div>
      <div class="metric"><div class="metric-label">Valeur</div><div class="metric-value neutral" style="font-size: 15px;">€${fmt(value)}</div></div>
    </div>
    ${reserveWarning ? `<div class="alert alert-warning" style="margin-bottom: 0.5rem;">Réserve insuffisante pour un DCA complet — montant ajusté automatiquement.</div>` : ''}
    <div class="decision-box ${decisionClass}">
      <div class="decision-label">${calc.reason.toUpperCase()} — DCA RECOMMANDÉ</div>
      <div class="decision-amount">€${fmt(calc.dcaRecommended)}</div>
      <div class="decision-detail">Base: €${fmt(a.dcaBase)} | Variation: ${deltaText} | Réserve: €${fmt(a.reserve || 0)} | Écart prix: ${calc.pct > 0 ? '+' : ''}${calc.pct}%</div>
      <div class="reserve-bar"><div class="reserve-fill" style="width: ${reservePct}%"></div></div>
    </div>
    <div style="display: flex; gap: 8px; margin-top: 0.75rem; flex-wrap: wrap;">
      <button class="btn btn-success" onclick="applyDCA('${a.id}')">Appliquer ce DCA →</button>
      <button class="btn" onclick="updatePrice('${a.id}')">Mettre à jour le prix</button>
    </div>
  </div>`;
}

function renderAssets(d) {
  const assets = d.assets || [];
  return `
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
    <div class="section-title" style="margin: 0;">Mes actifs</div>
    <button class="btn btn-primary" onclick="openAddAsset()">+ Ajouter un actif</button>
  </div>
  ${assets.length === 0 ? `<div class="empty-state"><div class="empty-icon">📦</div>Aucun actif. Ajoutez votre premier actif pour commencer.</div>` : ''}
  ${assets.map(a => renderAssetCard(a, false)).join('')}`;
}

function renderHistory(d) {
  const history = [...(d.history || [])].reverse();
  return `
  <div class="section-title">Historique des transactions</div>
  <div class="card">
    ${history.length === 0 ? `<div class="empty-state" style="padding: 2rem 0;"><div class="empty-icon">📋</div>Aucune transaction enregistrée.</div>` : history.map(h => `
    <div class="history-item">
      <div>
        <div style="font-weight: 500;">${h.assetName} — €${fmt(h.dcaApplied)} investis</div>
        <div class="history-date">${h.date} | Prix: €${fmt(h.price)} | Qté: +${h.qty}</div>
        <div style="font-size: 11px; color: var(--color-text-secondary);">${h.reason}</div>
      </div>
      <div class="history-amount ${h.reserveDelta >= 0 ? 'pos' : 'neg'}">${h.reserveDelta >= 0 ? '+' : ''}€${fmt(h.reserveDelta)}<br><span style="font-size: 10px; color: var(--color-text-secondary);">réserve</span></div>
    </div>`).join('')}
  </div>
  ${history.length > 0 ? `<button class="btn" onclick="exportCSV()" style="width: 100%;">Exporter CSV ↗</button>` : ''}`;
}

function renderSimulator(d) {
  const assets = d.assets || [];
  const sel = state.simAsset || (assets[0] ? assets[0].id : null);
  const asset = assets.find(a => a.id === sel);
  const months = parseInt(state.simMonths || 12);
  let simRows = [];
  if(asset) {
    let reserve = asset.reserve || 0;
    let qty = asset.quantity;
    let totalInvested = 0;
    for(let i = 0; i < months; i++) {
      const simulatedPct = state.simScenario === 'bull' ? 3 : state.simScenario === 'bear' ? -3 : (Math.random() - 0.5) * 6;
      const price = asset.currentPrice * Math.pow(1 + simulatedPct/100, i);
      const tmpAsset = {...asset, currentPrice: price, reserve};
      const c = calcDCA(tmpAsset);
      const dca = c.dcaRecommended;
      const qtyBought = price > 0 ? Math.round((dca / price) * 10000) / 10000 : 0;
      const reserveDelta = dca - asset.dcaBase;
      reserve = Math.max(0, reserve - reserveDelta);
      qty += qtyBought;
      totalInvested += dca;
      simRows.push({ month: i+1, price: Math.round(price * 100)/100, dca, reserve: Math.round(reserve * 100)/100, qty: Math.round(qty * 1000)/1000, totalInvested: Math.round(totalInvested * 100)/100 });
    }
  }
  return `
  <div class="section-title">Simulateur</div>
  <div class="card">
    <div class="input-row">
      <div class="input-group"><label>Actif</label>
        <select onchange="state.simAsset=this.value;render()">
          ${assets.map(a => `<option value="${a.id}" ${sel === a.id ? 'selected' : ''}>${a.name}</option>`).join('')}
        </select>
      </div>
      <div class="input-group"><label>Durée (mois)</label>
        <input type="number" min="1" max="60" value="${months}" onchange="state.simMonths=this.value;render()">
      </div>
      <div class="input-group"><label>Scénario prix</label>
        <select onchange="state.simScenario=this.value;render()">
          <option value="flat" ${state.simScenario==='flat'?'selected':''}>Prix stable</option>
          <option value="bull" ${state.simScenario==='bull'?'selected':''}>Marché haussier</option>
          <option value="bear" ${state.simScenario==='bear'?'selected':''}>Marché baissier</option>
        </select>
      </div>
    </div>
  </div>
  ${!asset ? '<div class="empty-state">Ajoutez un actif pour simuler.</div>' : `
  <div class="card" style="overflow-x: auto;">
    <table style="width: 100%; font-size: 12px; border-collapse: collapse;">
      <thead><tr>${['Mois','Prix €','DCA €','Réserve €','Quantité','Total investi €'].map(h => `<th style="text-align: right; padding: 6px 8px; color: var(--color-text-secondary); font-weight: 500; border-bottom: 0.5px solid var(--color-border-tertiary);">${h}</th>`).join('')}</tr></thead>
      <tbody>${simRows.map((r,i) => `<tr style="background: ${i%2===0 ? 'transparent' : 'var(--color-background-secondary)'}">
        <td style="padding: 5px 8px; text-align: right;">${r.month}</td>
        <td style="padding: 5px 8px; text-align: right;">${fmt(r.price)}</td>
        <td style="padding: 5px 8px; text-align: right; font-weight: 500;">${fmt(r.dca)}</td>
        <td style="padding: 5px 8px; text-align: right; color: #0F6E56;">${fmt(r.reserve)}</td>
        <td style="padding: 5px 8px; text-align: right;">${r.qty}</td>
        <td style="padding: 5px 8px; text-align: right;">${fmt(r.totalInvested)}</td>
      </tr>`).join('')}</tbody>
    </table>
  </div>`}`;
}

function renderSettings(d) {
  return `
  <div class="section-title">Paramètres globaux</div>
  <div class="card">
    <div style="font-size: 13px; color: var(--color-text-secondary); margin-bottom: 1rem;">Les seuils par défaut s'appliquent aux nouveaux actifs. Chaque actif peut avoir ses propres paramètres.</div>
    <div class="input-row">
      <div class="input-group"><label>Seuil marché élevé (%)</label><input type="number" id="s-high" value="${d.defaults?.high || 20}" step="1"></div>
      <div class="input-group"><label>Réduction DCA (%)</label><input type="number" id="s-highAdj" value="${d.defaults?.highAdjust || 40}" step="1"></div>
      <div class="input-group"><label>Seuil marché bas (%)</label><input type="number" id="s-low" value="${d.defaults?.low || 20}" step="1"></div>
      <div class="input-group"><label>Augmentation DCA (%)</label><input type="number" id="s-lowAdj" value="${d.defaults?.lowAdjust || 40}" step="1"></div>
    </div>
    <button class="btn btn-primary" onclick="saveSettings()">Sauvegarder les paramètres</button>
  </div>
  <div class="card" style="margin-top: 1rem;">
    <div style="font-size: 14px; font-weight: 500; margin-bottom: 0.5rem;">Votre code d'accès</div>
    <div class="code-display" style="font-size: 22px; padding: 0.75rem 1.5rem;">${d.userCode}</div>
    <div style="font-size: 12px; color: var(--color-text-secondary); margin-top: 0.5rem;">Conservez ce code pour accéder à votre compte depuis un autre appareil.</div>
  </div>
  <div class="card" style="margin-top: 1rem; border-color: #F7C1C1;">
    <div style="font-size: 14px; font-weight: 500; color: #A32D2D; margin-bottom: 0.5rem;">Zone de danger</div>
    <button class="btn btn-danger" onclick="if(confirm('Supprimer toutes les données ?')) resetAll()">Réinitialiser toutes les données</button>
  </div>`;
}

function renderModal() {
  const m = state.modal;
  if(m.type === 'add-asset') {
    const d = m.data || {};
    return `<div class="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <div class="modal-title">Ajouter un actif</div>
      <div class="input-row">
        <div class="input-group"><label>Nom</label><input id="m-name" type="text" value="${d.name||''}" placeholder="Ex: Bitcoin"></div>
        <div class="input-group"><label>Ticker</label><input id="m-ticker" type="text" value="${d.ticker||''}" placeholder="BTC"></div>
      </div>
      <div class="input-row">
        <div class="input-group"><label>Icône (emoji)</label><input id="m-icon" type="text" value="${d.icon||'📦'}" maxlength="2"></div>
        <div class="input-group"><label>Prix actuel (€)</label><input id="m-price" type="number" value="${d.currentPrice||''}" step="0.01" min="0"></div>
      </div>
      <div class="input-row">
        <div class="input-group"><label>Quantité détenue</label><input id="m-qty" type="number" value="${d.quantity||0}" step="0.0001" min="0"></div>
        <div class="input-group"><label>Prix moyen d'achat (€)</label><input id="m-avg" type="number" value="${d.avgPrice||''}" step="0.01" min="0"></div>
      </div>
      <div class="input-row">
        <div class="input-group"><label>DCA mensuel de base (€)</label><input id="m-dca" type="number" value="${d.dcaBase||100}" step="1" min="1"></div>
        <div class="input-group"><label>Réserve initiale (€)</label><input id="m-reserve" type="number" value="${d.reserve||0}" step="1" min="0"></div>
      </div>
      <div style="margin-top: 0.75rem; font-size: 13px; color: var(--color-text-secondary); font-weight: 500;">Seuils de décision (laisser vide pour les défauts)</div>
      <div class="input-row" style="margin-top: 0.5rem;">
        <div class="input-group"><label>Seuil haut (%)</label><input id="m-thigh" type="number" value="${d.thresholds?.high||20}"></div>
        <div class="input-group"><label>Réduction (%)</label><input id="m-thighA" type="number" value="${d.thresholds?.highAdjust||40}"></div>
        <div class="input-group"><label>Seuil bas (%)</label><input id="m-tlow" type="number" value="${d.thresholds?.low||20}"></div>
        <div class="input-group"><label>Augmentation (%)</label><input id="m-tlowA" type="number" value="${d.thresholds?.lowAdjust||40}"></div>
      </div>
      <div class="modal-actions">
        <button class="btn" onclick="closeModal()">Annuler</button>
        <button class="btn btn-primary" onclick="saveAsset()">Ajouter</button>
      </div>
    </div></div>`;
  }
  if(m.type === 'update-price') {
    return `<div class="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <div class="modal-title">Mettre à jour : ${m.asset.name}</div>
      <div class="input-row">
        <div class="input-group"><label>Nouveau prix actuel (€)</label><input id="m-newprice" type="number" value="${m.asset.currentPrice}" step="0.01" min="0"></div>
        <div class="input-group"><label>Quantité détenue</label><input id="m-newqty" type="number" value="${m.asset.quantity}" step="0.0001" min="0"></div>
      </div>
      <div class="input-row">
        <div class="input-group"><label>Prix moyen d'achat (€)</label><input id="m-newavg" type="number" value="${m.asset.avgPrice||''}" step="0.01"></div>
      </div>
      <div class="modal-actions">
        <button class="btn" onclick="closeModal()">Annuler</button>
        <button class="btn btn-primary" onclick="confirmUpdatePrice()">Mettre à jour</button>
      </div>
    </div></div>`;
  }
  if(m.type === 'apply-dca') {
    const a = m.asset;
    const calc = calcDCA(a);
    const qtyBought = a.currentPrice > 0 ? Math.round((calc.dcaRecommended / a.currentPrice) * 10000) / 10000 : 0;
    return `<div class="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <div class="modal-title">Confirmer le DCA — ${a.name}</div>
      <div class="metric-grid" style="margin-bottom: 1rem;">
        <div class="metric"><div class="metric-label">Montant à investir</div><div class="metric-value neutral">€${fmt(calc.dcaRecommended)}</div></div>
        <div class="metric"><div class="metric-label">Quantité achetée</div><div class="metric-value">${qtyBought}</div></div>
        <div class="metric"><div class="metric-label">Variation réserve</div><div class="metric-value ${calc.delta <= 0 ? 'positive' : 'negative'}">${calc.delta >= 0 ? '-' : '+'}€${fmt(Math.abs(calc.delta))}</div></div>
      </div>
      <div class="decision-box ${calc.status==='high'?'decision-reduce':calc.status==='low'?'decision-invest':'decision-normal'}" style="margin-bottom: 1rem;">
        <div class="decision-label">${calc.reason}</div>
        <div style="font-size: 13px; color: var(--color-text-secondary); margin-top: 4px;">${calc.status==='high'?`Marché +${calc.pct}% au-dessus du prix moyen. Réduction du DCA de ${a.thresholds?.highAdjust||40}%.`:calc.status==='low'?`Marché ${calc.pct}% en dessous du prix moyen. Augmentation du DCA de ${a.thresholds?.lowAdjust||40}% via la réserve.`:'Le prix est dans la fourchette neutre. DCA normal appliqué.'}</div>
      </div>
      ${!calc.canApply && calc.status==='low' ? `<div class="alert alert-warning">Réserve épuisée. Impossible d'augmenter le DCA au-delà du montant de base.</div>` : ''}
      <div class="modal-actions">
        <button class="btn" onclick="closeModal()">Annuler</button>
        <button class="btn btn-success" onclick="confirmDCA()">Confirmer et enregistrer</button>
      </div>
    </div></div>`;
  }
  return '';
}

function fmt(n) {
  if(n === undefined || n === null || isNaN(n)) return '0';
  return Number(n).toLocaleString('fr-FR', { minimumFractionDigits: 0, maximumFractionDigits: 2 });
}

function attachEvents() {}

function newAccount() {
  const code = genCode();
  const d = { userCode: code, assets: [], history: [], defaults: { high: 20, highAdjust: 40, low: 20, lowAdjust: 40 } };
  saveData(d);
  state.data = d;
  state.screen = 'main';
  render();
  setTimeout(() => alert(`Votre code d'accès unique :\n\n${code}\n\nConservez-le précieusement pour accéder à votre compte depuis un autre appareil.`), 100);
}

function showEnterCode() { state.screen = 'enter-code'; render(); }
function showWelcome() { state.screen = 'loading'; render(); }

function loginWithCode() {
  const code = (document.getElementById('code-input')?.value || '').toUpperCase().trim();
  const d = loadData();
  if(d && d.userCode === code) {
    state.data = d;
    state.screen = 'main';
    render();
  } else {
    const el = document.getElementById('code-error');
    if(el) el.textContent = 'Code introuvable. Vérifiez votre code ou créez un nouveau compte.';
  }
}

function setTab(t) { state.tab = t; render(); }

function copyCode() {
  if(navigator.clipboard) navigator.clipboard.writeText(state.data.userCode).then(() => alert('Code copié !'));
}

function logout() { if(confirm('Se déconnecter ?')) { state.screen = 'loading'; state.data = null; render(); } }
function resetAll() { localStorage.removeItem(DB_KEY); state.screen = 'loading'; state.data = null; render(); }

function openAddAsset() { state.modal = { type: 'add-asset' }; render(); }
function closeModal() { state.modal = null; render(); }

function saveAsset() {
  const name = document.getElementById('m-name')?.value.trim();
  const ticker = document.getElementById('m-ticker')?.value.trim();
  const icon = document.getElementById('m-icon')?.value.trim() || '📦';
  const currentPrice = parseFloat(document.getElementById('m-price')?.value) || 0;
  const quantity = parseFloat(document.getElementById('m-qty')?.value) || 0;
  const avgPrice = parseFloat(document.getElementById('m-avg')?.value) || currentPrice;
  const dcaBase = parseFloat(document.getElementById('m-dca')?.value) || 100;
  const reserve = parseFloat(document.getElementById('m-reserve')?.value) || 0;
  const thresholds = {
    high: parseFloat(document.getElementById('m-thigh')?.value) || 20,
    highAdjust: parseFloat(document.getElementById('m-thighA')?.value) || 40,
    low: parseFloat(document.getElementById('m-tlow')?.value) || 20,
    lowAdjust: parseFloat(document.getElementById('m-tlowA')?.value) || 40,
  };
  if(!name) { alert('Veuillez entrer un nom pour l\'actif.'); return; }
  const asset = { id: 'a_' + Date.now(), name, ticker, icon, currentPrice, quantity, avgPrice, dcaBase, reserve, thresholds };
  state.data.assets.push(asset);
  saveData(state.data);
  state.modal = null;
  state.tab = 'dashboard';
  render();
}

function deleteAsset(id) {
  if(!confirm('Supprimer cet actif ?')) return;
  state.data.assets = state.data.assets.filter(a => a.id !== id);
  saveData(state.data);
  render();
}

function updatePrice(id) {
  const asset = state.data.assets.find(a => a.id === id);
  if(!asset) return;
  state.modal = { type: 'update-price', asset };
  render();
}

function confirmUpdatePrice() {
  const id = state.modal.asset.id;
  const asset = state.data.assets.find(a => a.id === id);
  if(!asset) return;
  asset.currentPrice = parseFloat(document.getElementById('m-newprice')?.value) || asset.currentPrice;
  asset.quantity = parseFloat(document.getElementById('m-newqty')?.value) || asset.quantity;
  const newAvg = parseFloat(document.getElementById('m-newavg')?.value);
  if(!isNaN(newAvg) && newAvg > 0) asset.avgPrice = newAvg;
  saveData(state.data);
  state.modal = null;
  render();
}

function applyDCA(id) {
  const asset = state.data.assets.find(a => a.id === id);
  if(!asset) return;
  state.modal = { type: 'apply-dca', asset };
  render();
}

function confirmDCA() {
  const a = state.modal.asset;
  const asset = state.data.assets.find(x => x.id === a.id);
  if(!asset) return;
  const calc = calcDCA(asset);
  const qtyBought = asset.currentPrice > 0 ? Math.round((calc.dcaRecommended / asset.currentPrice) * 10000) / 10000 : 0;
  const reserveDelta = asset.dcaBase - calc.dcaRecommended;
  asset.quantity = Math.round((asset.quantity + qtyBought) * 10000) / 10000;
  asset.reserve = Math.max(0, Math.round(((asset.reserve || 0) + reserveDelta) * 100) / 100);
  const newAvg = (asset.avgPrice * (asset.quantity - qtyBought) + asset.currentPrice * qtyBought) / asset.quantity;
  asset.avgPrice = Math.round(newAvg * 100) / 100;
  const entry = {
    id: 'h_' + Date.now(),
    date: new Date().toLocaleString('fr-FR', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' }),
    assetName: asset.name,
    assetId: asset.id,
    price: asset.currentPrice,
    dcaApplied: calc.dcaRecommended,
    qty: qtyBought,
    reserveDelta: Math.round(reserveDelta * 100) / 100,
    reason: calc.reason,
  };
  if(!state.data.history) state.data.history = [];
  state.data.history.push(entry);
  saveData(state.data);
  state.modal = null;
  render();
}

function saveSettings() {
  const h = parseFloat(document.getElementById('s-high')?.value) || 20;
  const hA = parseFloat(document.getElementById('s-highAdj')?.value) || 40;
  const l = parseFloat(document.getElementById('s-low')?.value) || 20;
  const lA = parseFloat(document.getElementById('s-lowAdj')?.value) || 40;
  state.data.defaults = { high: h, highAdjust: hA, low: l, lowAdjust: lA };
  saveData(state.data);
  alert('Paramètres sauvegardés.');
}

function exportCSV() {
  const h = state.data.history || [];
  const headers = ['Date','Actif','Prix','DCA appliqué','Quantité','Variation réserve','Raison'];
  const rows = h.map(e => [e.date, e.assetName, e.price, e.dcaApplied, e.qty, e.reserveDelta, e.reason]);
  const csv = [headers, ...rows].map(r => r.join(';')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'dca_historique.csv';
  a.click();
}

window.newAccount = newAccount;
window.showEnterCode = showEnterCode;
window.showWelcome = showWelcome;
window.loginWithCode = loginWithCode;
window.setTab = setTab;
window.copyCode = copyCode;
window.logout = logout;
window.resetAll = resetAll;
window.openAddAsset = openAddAsset;
window.closeModal = closeModal;
window.saveAsset = saveAsset;
window.deleteAsset = deleteAsset;
window.updatePrice = updatePrice;
window.confirmUpdatePrice = confirmUpdatePrice;
window.applyDCA = applyDCA;
window.confirmDCA = confirmDCA;
window.saveSettings = saveSettings;
window.exportCSV = exportCSV;
window.state = state;

const existing = loadData();
if(existing) {
  state.data = existing;
  state.screen = 'main';
}
render();
</script>
</body>
</html>
